version: '3.8'

services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://hexacv_user:hexacv_password@db:5432/hexacv_db?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super_secret_jwt_key_12345
      - VITE_OAUTH_PORTAL_URL=https://auth.hexastacksolutions.com
      - VITE_APP_ID=hexacv_prod_app
    depends_on:
      - db
      - redis
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=hexacv_user
      - POSTGRES_PASSWORD=hexacv_password
      - POSTGRES_DB=hexacv_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
