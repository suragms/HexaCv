<style>
        /* Ambient Background */
        body {
            background-color: #0b1326; /* Dark Slate */
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(173, 198, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(147, 204, 255, 0.15) 0%, transparent 50%);
            background-attachment: fixed;
            color: #dae2fd;
        }

        /* Glassmorphism Classes */
        .glass-surface {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top-color: rgba(255, 255, 255, 0.2);
            border-left-color: rgba(255, 255, 255, 0.2);
        }
        
        .glass-floating {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(184, 196, 255, 0.05);
        }

        .glass-input {
            background: rgba(31, 41, 55, 0.5); /* Slate 900 */
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.2);
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }
        
        .glass-input:focus {
            outline: none;
            border-color: #93ccff; /* Accent Cyan */
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.2), 0 0 8px 0 rgba(147, 204, 255, 0.3);
        }

        /* Tabs */
        .tab-btn {
            position: relative;
            transition: color 0.3s ease;
        }
        .tab-btn.active {
            color: #b8c4ff;
        }
        .tab-indicator {
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #b8c4ff;
            transform: scaleX(0);
            transition: transform 0.3s ease;
            transform-origin: left;
        }
        .tab-btn.active .tab-indicator {
            transform: scaleX(1);
        }

        /* Drag & Drop Zone */
        .drop-zone {
            border: 2px dashed rgba(184, 196, 255, 0.3);
            transition: all 0.3s ease;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #b8c4ff;
            background: rgba(184, 196, 255, 0.05);
        }

        /* Progress Pipe */
        .progress-pipe {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }
        .progress-fill {
            background: linear-gradient(90deg, #b8c4ff, #93ccff);
            height: 100%;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(147, 204, 255, 0.5);
        }

        /* Custom Checkbox/Radio */
        .custom-radio {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #adc6ff; /* Secondary Blue */
            border-radius: 50%;
            background: transparent;
            display: inline-block;
            position: relative;
            cursor: pointer;
        }
        .custom-radio:checked::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: #adc6ff;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(173, 198, 255, 0.8);
        }

        /* Gradients */
        .bg-gradient-primary {
            background: linear-gradient(135deg, #b8c4ff 0%, #adc6ff 100%);
        }
    </style>
<style>

      min-height: max(884px, 100dvh);

<body class="font-sans antialiased min-h-screen flex flex-col pt-16 pb-20">
<!-- TopAppBar -->

<span class="material-symbols-outlined">auto_awesome</span>

<div class="flex flex-col gap-6 w-full hidden animate-fade-in" id="tab-build">

<span class="material-symbols-outlined text-[24px]">download</span>
<span class="mt-1">Download</span>

<script>
        // Simple Tab Switching Logic
        function switchTab(tabId) {
            const tabs = document.querySelectorAll('.tab-btn');
            const contents = [document.getElementById('tab-upload'), document.getElementById('tab-build')];

            tabs.forEach((tab, index) => {
                if(tab.innerText.toLowerCase().includes(tabId)) {
                    tab.classList.add('active');
                    contents[index].classList.remove('hidden');
                    contents[index].classList.add('block');
                } else {
                    tab.classList.remove('active');
                    contents[index].classList.remove('block');
                    contents[index].classList.add('hidden');
                }
            });
        }
    </script>
