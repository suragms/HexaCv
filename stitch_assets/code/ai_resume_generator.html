<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HexaCv - Resume Creation Workspace</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-primary": "#b4c5ff",
                    "primary-fixed": "#dbe1ff",
                    "inverse-on-surface": "#f0f0fb",
                    "on-surface-variant": "#434655",
                    "tertiary-fixed": "#ffdbcd",
                    "on-primary-fixed": "#00174b",
                    "on-tertiary": "#ffffff",
                    "on-surface": "#191b23",
                    "on-background": "#191b23",
                    "on-tertiary-fixed-variant": "#7d2d00",
                    "on-secondary-fixed": "#00201d",
                    "on-error": "#ffffff",
                    "surface-tint": "#0053db",
                    "surface-container-low": "#f3f3fe",
                    "on-secondary-fixed-variant": "#00504a",
                    "tertiary-container": "#bc4800",
                    "on-tertiary-container": "#ffede6",
                    "primary": "#004ac6",
                    "surface-container-lowest": "#ffffff",
                    "error-container": "#ffdad6",
                    "inverse-surface": "#2e3039",
                    "surface-container": "#ededf9",
                    "background": "#faf8ff",
                    "on-primary-container": "#eeefff",
                    "secondary-container": "#99efe5",
                    "outline-variant": "#c3c6d7",
                    "on-secondary-container": "#006f67",
                    "surface-container-highest": "#e1e2ed",
                    "surface-dim": "#d9d9e5",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed-dim": "#ffb596",
                    "primary-container": "#2563eb",
                    "surface-container-high": "#e7e7f3",
                    "surface-bright": "#faf8ff",
                    "secondary": "#006a63",
                    "on-tertiary-fixed": "#360f00",
                    "on-error-container": "#93000a",
                    "surface-variant": "#e1e2ed",
                    "on-primary-fixed-variant": "#003ea8",
                    "on-primary": "#ffffff",
                    "secondary-fixed": "#9cf2e8",
                    "error": "#ba1a1a",
                    "outline": "#737686",
                    "tertiary": "#943700",
                    "secondary-fixed-dim": "#80d5cb",
                    "primary-fixed-dim": "#b4c5ff",
                    "surface": "#faf8ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "4px",
                    "max-width": "1280px",
                    "xs": "4px",
                    "xl": "32px",
                    "lg": "24px",
                    "margin-mobile": "16px",
                    "md": "16px",
                    "gutter": "24px",
                    "sm": "8px",
                    "margin-desktop": "48px"
            },
            "fontFamily": {
                    "label-md": [
                            "Inter"
                    ],
                    "caption": [
                            "Inter"
                    ],
                    "display": [
                            "Inter"
                    ],
                    "headline-lg-mobile": [
                            "Inter"
                    ],
                    "headline-md": [
                            "Inter"
                    ],
                    "body-lg": [
                            "Inter"
                    ],
                    "headline-lg": [
                            "Inter"
                    ],
                    "body-md": [
                            "Inter"
                    ]
            },
            "fontSize": {
                    "label-md": [
                            "14px",
                            {
                                    "lineHeight": "1.2",
                                    "letterSpacing": "0.05em",
                                    "fontWeight": "600"
                            }
                    ],
                    "caption": [
                            "12px",
                            {
                                    "lineHeight": "1.4",
                                    "fontWeight": "400"
                            }
                    ],
                    "display": [
                            "48px",
                            {
                                    "lineHeight": "1.1",
                                    "letterSpacing": "-0.02em",
                                    "fontWeight": "800"
                            }
                    ],
                    "headline-lg-mobile": [
                            "24px",
                            {
                                    "lineHeight": "1.2",
                                    "fontWeight": "700"
                            }
                    ],
                    "headline-md": [
                            "24px",
                            {
                                    "lineHeight": "1.3",
                                    "fontWeight": "600"
                            }
                    ],
                    "body-lg": [
                            "18px",
                            {
                                    "lineHeight": "1.6",
                                    "fontWeight": "400"
                            }
                    ],
                    "headline-lg": [
                            "32px",
                            {
                                    "lineHeight": "1.2",
                                    "letterSpacing": "-0.01em",
                                    "fontWeight": "700"
                            }
                    ],
                    "body-md": [
                            "16px",
                            {
                                    "lineHeight": "1.5",
                                    "fontWeight": "400"

                    ]
            }
    },
        },
      }
    </script>
</head>
<body class="bg-[#f8fafc] text-on-surface min-h-screen flex flex-col font-body-md antialiased overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Bar -->
<header class="w-full px-gutter py-md flex items-center justify-start absolute top-0 left-0 z-10">
<button class="flex items-center gap-xs text-on-surface-variant hover:text-primary transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 rounded-lg p-xs">
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_back">arrow_back</span>
<span class="font-label-md text-label-md">Back to Landing</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop mt-xl">
<!-- Glassmorphic Container -->
<div class="w-full max-w-4xl bg-white/90 backdrop-blur-[12px] border border-white/50 shadow-[0px_4px_20px_rgba(0,0,0,0.03)] rounded-xl overflow-hidden flex flex-col">
<!-- Header Section -->
<div class="px-lg py-xl flex flex-col items-center justify-center text-center border-b border-surface-container/50">
<div class="w-12 h-12 rounded-full bg-secondary-container/20 text-secondary flex items-center justify-center mb-md border border-secondary-container/30">
<span class="material-symbols-outlined text-[24px]" data-icon="auto_awesome">auto_awesome</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-xs tracking-tight">Let's Get Started</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-lg">Upload your existing resume to parse, or use AI to generate one.</p>
</div>
<!-- Tab Bar -->
<div class="w-full bg-surface-container-low border-b border-surface-container flex overflow-x-auto snap-x hide-scrollbar">
<!-- Tab 1 -->
<button class="flex-1 min-w-[160px] snap-center px-md py-sm flex flex-col items-center justify-center gap-xs border-b-2 border-transparent text-on-surface-variant hover:bg-surface-container/50 transition-colors focus:outline-none focus:bg-surface-container">
<span class="material-symbols-outlined text-[20px]" data-icon="cloud_upload">cloud_upload</span>
<span class="font-label-md text-label-md">Upload PDF/DOCX</span>
</button>
<!-- Tab 2 -->
<button class="flex-1 min-w-[160px] snap-center px-md py-sm flex flex-col items-center justify-center gap-xs border-b-2 border-transparent text-on-surface-variant hover:bg-surface-container/50 transition-colors focus:outline-none focus:bg-surface-container">
<span class="material-symbols-outlined text-[20px]" data-icon="edit">edit</span>
<span class="font-label-md text-label-md">Start from Scratch</span>
</button>
<!-- Tab 3 (Active) -->
<button class="flex-1 min-w-[160px] snap-center px-md py-sm flex flex-col items-center justify-center gap-xs border-b-2 border-secondary bg-secondary/10 text-secondary focus:outline-none">
<span class="material-symbols-outlined text-[20px]" data-icon="auto_awesome">auto_awesome</span>
<span class="font-label-md text-label-md">Auto Generate</span>
</button>
<!-- Tab 4 -->
<button class="flex-1 min-w-[160px] snap-center px-md py-sm flex flex-col items-center justify-center gap-xs border-b-2 border-transparent text-on-surface-variant hover:bg-surface-container/50 transition-colors focus:outline-none focus:bg-surface-container">
<span class="material-symbols-outlined text-[20px]" data-icon="work">work</span>
<span class="font-label-md text-label-md">LinkedIn Import</span>
</button>
</div>
<!-- Form Area (Auto Generate) -->
<div class="p-lg md:p-xl flex flex-col gap-lg bg-surface-bright/50">
<!-- Target Job Title -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="job-title">Target Job Title</label>
<input class="w-full bg-[#f1f5f9] border border-transparent focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-outline outline-none transition-all duration-200" id="job-title" placeholder="e.g. Generative AI Engineer" type="text"/>
</div>
<!-- 2-Column Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md md:gap-lg">
<!-- Experience Level -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="experience">Experience Level</label>
<div class="relative">
<select class="w-full bg-[#f1f5f9] border border-transparent focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-md py-sm font-body-md text-body-md text-on-surface appearance-none outline-none transition-all duration-200 cursor-pointer pr-xl" id="experience">
<option disabled="" selected="" value="">Select Level</option>
<option value="fresher">Fresher</option>
<option value="1-3">1–3 yrs</option>
<option value="3-5">3–5 yrs</option>
<option value="5-8">5–8 yrs</option>
<option value="8+">8+ yrs</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-outline pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Target Market -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="market">Target Market</label>
<div class="relative">
<select class="w-full bg-[#f1f5f9] border border-transparent focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-md py-sm font-body-md text-body-md text-on-surface appearance-none outline-none transition-all duration-200 cursor-pointer pr-xl" id="market">
<option disabled="" selected="" value="">Select Market</option>
<option value="india">India</option>
<option value="gulf">Gulf</option>
<option value="us">US</option>
<option value="global">Global</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-outline pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Background & Highlights -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="background">Your Background &amp; Highlights</label>
<textarea class="w-full bg-[#f1f5f9] border border-transparent focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-outline outline-none transition-all duration-200 resize-y min-h-[100px]" id="background" placeholder="Briefly describe your key skills, past achievements, or relevant projects..." rows="4"></textarea>
</div>
<!-- Job Description (Optional) -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface flex justify-between items-center" for="jd">
<span>Job Description <span class="text-outline font-normal">(Optional)</span></span>
<span class="text-[10px] bg-surface-container px-xs py-[2px] rounded text-on-surface-variant">Helps tailor content</span>
</label>
<textarea class="w-full bg-[#f1f5f9] border border-transparent focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-outline outline-none transition-all duration-200 resize-y min-h-[80px]" id="jd" placeholder="Paste the job description here for better AI alignment..." rows="3"></textarea>
</div>
<!-- CTA Button -->
<button class="w-full bg-secondary hover:bg-[#005a54] text-white rounded-lg px-lg py-md flex items-center justify-center gap-sm font-label-md text-label-md transition-all duration-200 shadow-sm hover:shadow-md transform hover:scale-[1.01] focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-2 mt-sm">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
<span>Generate with HexaSmart</span>
</button>
</div>
</div>
</main>
<style>
        /* Utility to hide scrollbar but keep functionality */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</body></html>
