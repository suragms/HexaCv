<!DOCTYPE html>

<style>
        body {
            background-color: theme('colors.background');
            background-image: radial-gradient(circle at 100% 0%, theme('colors.primary-fixed-dim'), transparent 50%),
                              radial-gradient(circle at 0% 100%, theme('colors.surface-container-low'), transparent 50%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0px 8px 32px rgba(0, 0, 0, 0.05);
        }
        .dashed-zone {
            background: rgba(37, 99, 235, 0.05);
            border: 2px dashed theme('colors.primary-container');
            transition: all 0.2s ease-in-out;
        }
        .dashed-zone:hover {
            background: rgba(37, 99, 235, 0.08);
            border-color: theme('colors.primary');
        }
        .secondary-block {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.2s ease-in-out;
        }
        .secondary-block:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: scale(1.01);
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.03);
        }
    </style>
</head>
<body class="text-on-surface antialiased flex flex-col items-center justify-center pt-24 pb-12">
<!-- Top Navigation (Transactional Layout - Suppressed main nav, simplified to Back action) -->
<nav class="fixed top-0 w-full z-50 flex items-center px-margin-desktop py-4 max-w-max-width mx-auto bg-white/80 backdrop-blur-md border-b border-white/40 shadow-sm">
<a class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors font-label-md text-label-md" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
            Back to Landing
        </a>
<div class="ml-auto font-headline-md text-headline-md font-bold text-primary">
            HexaCv
        </div>
</nav>
<!-- Main Content Area -->
<main class="w-full max-w-2xl px-margin-mobile md:px-0">
<!-- Central Glass Card -->
<div class="glass-card rounded-xl p-lg md:p-margin-desktop flex flex-col gap-xl">
<!-- Header Section -->
<div class="text-center flex flex-col items-center gap-sm">
<div class="w-16 h-16 rounded-full bg-primary-fixed flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">cloud_upload</span>
</div>
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface">Let's Get Started</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Upload your existing resume to parse, or build from scratch.</p>
</div>
<!-- Drag-and-Drop Zone -->
<div class="dashed-zone rounded-lg p-xl flex flex-col items-center justify-center text-center gap-md cursor-pointer group">
<span class="material-symbols-outlined text-primary-container text-5xl group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 0;">upload_file</span>
<div>
<p class="font-body-lg text-body-lg font-medium text-on-surface">Drag and drop your file here</p>
<p class="font-caption text-caption text-on-surface-variant mt-1">Supports PDF, DOCX, or TXT</p>
</div>
<button class="mt-2 bg-primary-container hover:bg-primary text-on-primary font-label-md text-label-md py-3 px-6 rounded-lg transition-colors shadow-sm hover:shadow-md">
                    Browse Files
                </button>
</div>
<!-- Divider -->
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-surface-dim"></div>
<span class="flex-shrink-0 mx-4 font-caption text-caption text-on-surface-variant font-medium tracking-widest">OR</span>
<div class="flex-grow border-t border-surface-dim"></div>
</div>
<!-- Secondary Option -->
<button class="secondary-block rounded-lg p-md flex items-center gap-md w-full text-left group">
<div class="w-12 h-12 rounded-lg bg-surface-container-low flex items-center justify-center group-hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors" style="font-variation-settings: 'FILL' 0;">edit_document</span>
</div>
<div class="flex-1">
<h3 class="font-label-md text-label-md text-on-surface">Start from Scratch</h3>
<p class="font-caption text-caption text-on-surface-variant">Use our step-by-step builder to create a new CV.</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" style="font-variation-settings: 'FILL' 0;">chevron_right</span>
</button>
</div>
</main>
